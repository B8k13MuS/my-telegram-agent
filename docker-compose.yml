version: "3.8"

services:
  app:
    build: .
    container_name: ai-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./docs:/app/docs:ro
    depends_on:
      qdrant:
        condition: service_healthy
    # On first run: ingest docs then start API
    command: >
      sh -c "python -m scripts.ingest_docs --clear &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-agent-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:
